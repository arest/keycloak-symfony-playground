x-extra-hosts: &extra-hosts
  extra_hosts:
    - "keycloak.playground.dev:host-gateway"
    - "symfony.playground.dev:host-gateway"
    - "vikunja.playground.dev:host-gateway"
    - "nextjs.playground.dev:host-gateway"

services:
  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./symfony:/var/www/symfony
    depends_on:
      php:
        condition: service_healthy
    networks:
      - internal
    <<: *extra-hosts

  php:
    build:
      context: ./docker/php
    container_name: symfony-php
    restart: unless-stopped
    volumes:
      - ./symfony:/var/www/symfony
    environment:
      DATABASE_URL: postgresql://keycloak:keycloak@postgres:5432/symfony?serverVersion=16&charset=utf8
      # Single URL — works inside containers (via extra_hosts) AND from browser (via /etc/hosts)
      OAUTH_KEYCLOAK_SERVER_URL: http://keycloak.playground.dev:8081
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    <<: *extra-hosts

  nextjs:
    build:
      context: .
      dockerfile: ./docker/nextjs/Dockerfile
    container_name: nextjs-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./nextjs-app:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Works from browser (via /etc/hosts) — no more localhost
      NEXT_PUBLIC_SYMFONY_URL: http://symfony.playground.dev:8080
    depends_on:
      - nginx
    networks:
      - internal
    <<: *extra-hosts

  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    restart: unless-stopped
    ports:
      - "9030:3456"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vikunja-files:/app/vikunja/files
      - ./docker/vikunja/configs/config.yml:/app/vikunja/config.yml:ro
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://vikunja.playground.dev:9030
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres
      VIKUNJA_DATABASE_PORT: "5432"
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: vikunja
      VIKUNJA_DATABASE_SSLMODE: disable
      VIKUNJA_AUTH_OPENID_ENABLED: "true"
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME: Keycloak
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL: http://keycloak.playground.dev:8081/realms/playground
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_LOGOUTURL: http://keycloak.playground.dev:8081/realms/playground/protocol/openid-connect/logout
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID: vikunja
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET: vikunja-secret
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_SCOPE: openid profile email vikunja_scope
      VIKUNJA_AUTH_LOCAL_ENABLED: "false"
    <<: *extra-hosts

  keycloak:
    build: ./docker/keycloak
    container_name: keycloak-server
    command: start-dev --import-realm
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      # Keycloak uses KC_HOSTNAME in redirect URIs — must match what the browser sees
      KC_HOSTNAME: http://keycloak.playground.dev:8081
      KC_FEATURES: scripts
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    <<: *extra-hosts

volumes:
  pgdata:
  vikunja-files:

networks:
  internal:
    driver: bridge

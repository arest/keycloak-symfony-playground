security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user:
            id: App\Core\Security\Service\UserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user

            custom_authenticators:
                - App\Core\Security\Service\KeycloakAuthenticator

            # Allow anonymous access before authentication
            pattern: ^/
            security: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        # Admin routes — require the adminPanel.access permission
        - { path: ^/admin, roles: !php/const App\Core\AccessControl\Permission\Config\GeneralPermissionStorage::ADMIN_PANEL_ACCESS }
        # Login and health routes — public
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/health, roles: PUBLIC_ACCESS }
        # API routes require full authentication
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }


when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

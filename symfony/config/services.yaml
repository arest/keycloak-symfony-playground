# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Frontend host for building absolute redirect URLs after login etc.
    frontend-host: '%env(FRONTEND_HOST)%'

    # PDO session handler DSN for PostgreSQL
    pdo-session-dsn: 'pgsql:host=postgres;port=5432;dbname=symfony;user=keycloak;password=keycloak'

    # Keycloak connection settings
    keycloak-server-url: '%env(OAUTH_KEYCLOAK_SERVER_URL)%'
    keycloak-realm: '%env(OAUTH_KEYCLOAK_REALM)%'

    # Service app (Client Credentials) settings
    keycloak-service-client-id: '%env(OAUTH_KEYCLOAK_SERVICE_CLIENT_ID)%'
    keycloak-service-client-secret: '%env(OAUTH_KEYCLOAK_SERVICE_CLIENT_SECRET)%'

    # Inline-constructed token URL for the Client Credentials grant
    keycloak-service-token-url: '%keycloak-server-url%/realms/%keycloak-realm%/protocol/openid-connect/token'

services:
    # DB-backed session handler using PDO (not loaded in test env — mock_file is used there)
    session.handler.pdo:
        class: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler
        arguments:
            - '%pdo-session-dsn%'
            - { db_table: sessions, db_id_col: sess_id, db_data_col: sess_data, db_time_col: sess_time, db_lifetime_col: sess_lifetime }
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # Scalar constructor arguments — Symfony cannot autowire these automatically
            $frontendHost: '%frontend-host%'
            $keycloakServerUrl: '%keycloak-server-url%'
            $keycloakRealm: '%keycloak-realm%'
            # Bind the service-account provider by type+name so autowiring resolves
            # GenericProvider $provider to our custom service ID (not the FQCN).
            League\OAuth2\Client\Provider\GenericProvider $provider: '@keycloak.service_account_provider'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Explicit service definition for the GenericProvider used by ServiceAccountAuthenticator.
    # Rather than constructing it with 'new' inside the service (DI violation),
    # we define it declaratively here so the container injects a fully-configured instance.
    # Uses a custom service ID instead of the FQCN to avoid class-name collisions.
    keycloak.service_account_provider:
        class: League\OAuth2\Client\Provider\GenericProvider
        arguments:
            $options:
                clientId: '%keycloak-service-client-id%'
                clientSecret: '%keycloak-service-client-secret%'
                urlAuthorize: ''
                urlAccessToken: '%keycloak-service-token-url%'
                urlResourceOwnerDetails: ''
            $collaborators: []

    # App\Core\Security\Service\KeycloakAdminAuthenticatorInterface:
    #     class: App\Core\Security\Service\KeycloakAdminAuthenticator

    # Expose TokenStorage as a Twig global so templates don't read session keys directly
    App\Core\Security\Service\TokenStorage:
        tags:
            - { name: twig.global, alias: token_storage }

    # ── RBAC / Permission services ─────────────────────────────────
    #
    # RolePermissionMapper receives the YAML mapping so it's not tied
    # to a bundle extension — just DI + parameter.
    App\Core\AccessControl\Permission\Config\RolePermissionMapper:
        arguments:
            $mapping: '%app.permissions.mapping%'

    # Bind the cache interface to the session-backed implementation.
    # Swap to a Redis-backed implementation here when needed.
    App\Core\AccessControl\Permission\Service\PermissionCacheInterface:
        class: App\Core\AccessControl\Permission\Service\SessionPermissionCache

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

# In the test environment, replace the PDO session handler with a NullSessionHandler
# since the tests use mock_file session storage and don't connect to PostgreSQL.
when@test:
    services:
        session.handler.pdo:
            class: Symfony\Component\HttpFoundation\Session\Storage\Handler\NullSessionHandler

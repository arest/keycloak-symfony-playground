# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # PDO session handler DSN for PostgreSQL
    pdo-session-dsn: 'pgsql:host=postgres;port=5432;dbname=symfony;user=keycloak;password=keycloak'

    # Keycloak connection settings
    keycloak-server-url: '%env(OAUTH_KEYCLOAK_SERVER_URL)%'
    keycloak-server-url-external: '%env(OAUTH_KEYCLOAK_SERVER_URL_EXTERNAL)%'
    keycloak-realm: '%env(OAUTH_KEYCLOAK_REALM)%'

services:
    # DB-backed session handler using PDO (not loaded in test env — mock_file is used there)
    session.handler.pdo:
        class: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler
        arguments:
            - '%pdo-session-dsn%'
            - { db_table: sessions, db_id_col: sess_id, db_data_col: sess_data, db_time_col: sess_time, db_lifetime_col: sess_lifetime }
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # Scalar constructor arguments — Symfony cannot autowire these automatically
            $keycloakServerUrl: '%keycloak-server-url%'
            $keycloakServerUrlExternal: '%keycloak-server-url-external%'
            $keycloakRealm: '%keycloak-realm%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Expose TokenStorage as a Twig global so templates don't read session keys directly
    App\Core\Security\Service\TokenStorage:
        tags:
            - { name: twig.global, alias: token_storage }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

# In the test environment, replace the PDO session handler with a NullSessionHandler
# since the tests use mock_file session storage and don't connect to PostgreSQL.
when@test:
    services:
        session.handler.pdo:
            class: Symfony\Component\HttpFoundation\Session\Storage\Handler\NullSessionHandler

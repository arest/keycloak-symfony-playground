services:
  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./symfony:/var/www/symfony
    depends_on:
      php:
        condition: service_healthy
    networks:
      - internal

  php:
    build:
      context: ./docker/php
    container_name: symfony-php
    restart: unless-stopped
    volumes:
      - ./symfony:/var/www/symfony
    environment:
      DATABASE_URL: postgresql://keycloak:keycloak@postgres:5432/symfony?serverVersion=16&charset=utf8
      OAUTH_KEYCLOAK_SERVER_URL_INTERNAL: http://keycloak:8080
      OAUTH_KEYCLOAK_SERVER_URL_EXTERNAL: http://localhost:8081
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak-server
    command: start-dev --import-realm
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge

# Map allowed origins for CORS
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost:3000$" $http_origin;
    "~^https?://symfony.playground.dev:8080$" $http_origin;
    "~^https?://nextjs.playground.dev:3000$" $http_origin;
    "~^https?://vikunja.playground.dev:9030$" $http_origin;
}

server {
    listen 80;
    server_name localhost;

    root /var/www/symfony/public;

    # Handle CORS preflight for API routes
    location ~ ^/api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cookie";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # CORS headers on the actual PHP response
        # (applied to API requests that internally redirect to index.php)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
